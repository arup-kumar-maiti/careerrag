name: Publish to PyPI

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    name: Build and Publish
    if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        shell: bash
        run: |
          tag_commit=$(git rev-list -n 1 "${{ github.ref_name }}")
          main_commits=$(git rev-list origin/main)
          if ! echo "$main_commits" | grep -q "$tag_commit"; then
            echo "::error::Tag ${{ github.ref_name }} is not on main branch"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install build tools
        shell: bash
        run: pip install build

      - name: Build package
        shell: bash
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        shell: bash
        run: |
          version="${{ github.ref_name }}"
          version="${version#v}"
          image="ghcr.io/${{ github.repository }}"
          docker build --build-arg VERSION="$version" -t "$image:$version" -t "$image:latest" .

      - name: Publish to GHCR
        shell: bash
        run: |
          version="${{ github.ref_name }}"
          version="${version#v}"
          image="ghcr.io/${{ github.repository }}"
          docker push "$image:$version"
          docker push "$image:latest"

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ github.ref_name }}"
          [ -f CHANGELOG.md ] || { echo "CHANGELOG.md not found."; exit 1; }
          notes=$(awk "/^## \[${version#v}\]/{found=1; next} /^## \[/{found=0} found" CHANGELOG.md)
          gh release create "$version" --title "$version" --notes "$notes"
