<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CareerRAG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../static/css/chat.css" />
  </head>
  <body>
    <main class="cr-root" data-name="John Doe">
      <div class="cr-stage" id="cr-stage" data-state="empty">
        <section class="cr-empty" id="cr-empty">
          <div class="cr-empty-above">
            <h1 class="cr-hero">Ask anything about <em>John Doe</em>.</h1>
          </div>
        </section>

        <div class="cr-chat" id="cr-chat" aria-hidden="true">
          <div class="cr-scroll" id="cr-scroll">
            <div class="cr-column" id="cr-column">
              <div class="cr-bottom-spacer" id="cr-bottom-spacer"></div>
            </div>
          </div>
        </div>

        <div class="cr-composer-wrap" id="cr-composer-wrap">
          <div class="cr-composer-inner">
            <form class="cr-composer" id="cr-composer">
              <textarea
                id="cr-input"
                class="cr-control cr-input"
                rows="1"
              ></textarea>
              <button
                id="cr-new"
                class="cr-control cr-reset"
                aria-label="New chat"
                title="New chat"
              >
                <svg
                  width="14"
                  height="14"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M3 12a9 9 0 1 0 3-6.7"></path>
                  <path d="M3 4v5h5"></path>
                </svg>
              </button>
              <button
                id="cr-send"
                class="cr-control cr-send"
                aria-label="Send"
                disabled
              >
                <svg
                  width="15"
                  height="15"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M12 19V5M5 12l7-7 7 7"></path>
                </svg>
              </button>
            </form>
          </div>
        </div>
      </div>
    </main>
    <script src="../static/js/initialize-chat.js"></script>
  </body>
</html>
